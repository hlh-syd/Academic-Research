server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: research-workbench
  web:
    resources:
      static-locations: classpath:/static/,file:./dist/
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/research_workbench}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:192969}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

app:
  jwt:
    secret: ${JWT_SECRET:research-workbench-secret-key-replace-in-production-2026}
    expiration-millis: ${JWT_EXPIRATION:86400000}
  storage:
    root: ${STORAGE_ROOT:storage}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging:
  level:
    org.springframework.security: INFO
